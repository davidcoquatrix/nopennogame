<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>NPNG - NoPenNoGame</title>
    <base href="/" />
    
    <!-- Polices de caractères depuis Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- CSS global et scoped Blazor -->
    <link href="css/app.css" rel="stylesheet" />
    <link href="NPNG.UI.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <!-- Spinner minimaliste le temps du chargement WASM -->
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Fredoka',sans-serif;font-size:1.5rem;color:#F5E642;background-color:#0D1B2A;">
            🎲 NPNG...
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.clearActiveText = () => {
            if (document.activeElement && document.activeElement.tagName === 'INPUT') {
                document.activeElement.value = '';
            }
        };

        window.goBack = () => {
            if (window.history.length > 1 && document.referrer.includes(window.location.host)) {
                window.history.back();
            } else {
                // S'il n'y a pas d'historique interne (ex: accès direct via URL), on retourne à l'accueil
                window.location.href = document.querySelector('base').href;
            }
        };
    </script>
</body>

</html>
